@if (model()) {
<div class="overview-header">
  <h1 class="overview-title">Entdecken</h1>
  <p class="overview-subtitle">
    Geschichten, Ideen und Perspektiven von unserer Community.
  </p>
</div>
<div class="blog-feed">
  @for (blog of model().data; track blog.id; let i = $index) {
  <BlogCard
    [model]="blog"
    [routeCommands]="['/detail/', blog.id]"
    (likeBlog)="likeBlog($event)"
  />
  }
</div>
}
