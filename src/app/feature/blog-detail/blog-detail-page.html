<article class="article-page">
  <header class="article-header">
    <span class="article-category editorial-label"
      >{{ "DETAIL.CATEGORY" | translate }}</span
    >
    <h1 class="article-title">{{ model().title }}</h1>
    <div class="article-meta">
      <div class="author-info">
        <div class="author-avatar">{{ initials() }}</div>
        <div class="author-details">
          <span class="author-name">{{ model().author }}</span>
          <span class="article-date"
            >{{ "DETAIL.PUBLISHED_ON" | translate: { value: formattedDate() }
            }}</span
          >
        </div>
      </div>
    </div>
  </header>

  <div class="article-hero">
    <img
      class="hero-image"
      [src]="model().headerImageUrl ?? 'https://picsum.photos/seed/' + model().id + '/1200/600'"
      alt="Article hero image"
    />
  </div>

  <div class="article-body editorial-body">
    <p>{{ model().content }}</p>
  </div>

  <a class="back-link" [routerLink]="['/overview']"
    >{{ "DETAIL.BACK_TO_OVERVIEW" | translate }}</a
  >
</article>
