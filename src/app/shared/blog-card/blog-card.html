<article class="editorial-card" [routerLink]="routeCommands()">
  <div class="card-image-wrapper">
    @defer (on viewport) {
    <img
      class="card-image"
      [src]="model().headerImageUrl || 'https://picsum.photos/seed/' + model().id + '/600/400'"
      alt="Article cover"
      loading="lazy"
    />
    } @placeholder {
    <div class="card-image-placeholder"></div>
    }
  </div>
  <div class="card-body">
    <span class="card-date">{{ formattedDate() }}</span>
    <h3 class="card-title" data-testid="title">{{ model().title }}</h3>
    <p class="card-preview">{{ model().contentPreview }}</p>
    <div class="card-meta">
      <div class="card-author-row">
        <div class="card-avatar">{{ initials() }}</div>
        <span class="card-author">{{ model().author }}</span>
      </div>
      <div class="card-actions">
        <button
          data-testid="like-button"
          class="card-action-btn"
          (click)="likeBlog.emit({ id: model().id, likedByMe: model().likedByMe }); $event.stopPropagation()"
          aria-label="Like this article"
        >
          <mat-icon
            data-testid="like-button-icon"
            [class.liked]="model().likedByMe"
            >{{ model().likedByMe ? 'favorite' : 'favorite_border' }}</mat-icon
          >
          @if (model().likes > 0) {
          <span class="action-count">{{ model().likes }}</span>
          }
        </button>
        <button
          class="card-action-btn"
          (click)="$event.stopPropagation()"
          aria-label="Comments"
        >
          <mat-icon>chat_bubble_outline</mat-icon>
          @if (model().comments > 0) {
          <span class="action-count">{{ model().comments }}</span>
          }
        </button>
        <button
          data-testid="share-button"
          [share]="{
            title: model().title,
            commands: routeCommands(),
            pictureUrl: model().headerImageUrl || 'https://picsum.photos/seed/' + model().id + '/232/200'
          }"
          class="card-action-btn"
          (click)="$event.stopPropagation()"
          aria-label="Share this article"
        >
          <mat-icon>share</mat-icon>
        </button>
      </div>
    </div>
  </div>
</article>
